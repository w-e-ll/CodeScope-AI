version: "3.9"

services:

  codescope-ai:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: codescope-ai

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - ./var:/app/var
      - ./etc:/app/etc

    restart: unless-stopped

    healthcheck:
      test: [
        "CMD",
        "curl",
        "--fail",
        "http://localhost:8501/_stcore/health"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - codescope-network


networks:
  codescope-network:
    driver: bridge
